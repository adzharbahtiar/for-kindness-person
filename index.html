<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat Untukmu! 🐮🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff0f3;
            overflow-x: hidden;
        }
        .font-pacifico {
            font-family: 'Pacifico', cursive;
        }
        .cow-container {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .cow-container:active {
            transform: scale(0.9);
        }
        .cow-animation {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .heart-rain {
            position: fixed;
            top: -10%;
            z-index: 10;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
        .card-pink {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 3px dashed #ffb3c1;
        }
        .gift-box {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gift-box:hover {
            transform: scale(1.2) rotate(10deg);
        }
        .flower-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Konten Utama -->
    <div class="max-w-md w-full text-center space-y-6 relative z-20">
        
        <!-- Icon Anak Sapi Interaktif -->
        <div class="cow-container inline-block mb-2" onclick="cowLove()">
            <div class="cow-animation">
                <svg width="140" height="140" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Kepala Sapi -->
                    <ellipse cx="100" cy="110" rx="70" ry="60" fill="#ffffff" stroke="#333" stroke-width="4"/>
                    <!-- Telinga -->
                    <ellipse cx="40" cy="80" rx="15" ry="25" fill="#ffc8dd" stroke="#333" stroke-width="3" transform="rotate(-30 40 80)"/>
                    <ellipse cx="160" cy="80" rx="15" ry="25" fill="#ffc8dd" stroke="#333" stroke-width="3" transform="rotate(30 160 80)"/>
                    <!-- Bercak Sapi -->
                    <path d="M60 70 Q70 60 85 75 T95 90" fill="#333" opacity="0.8"/>
                    <path d="M130 65 Q145 60 155 80" fill="#333" opacity="0.8"/>
                    <!-- Mata -->
                    <circle cx="75" cy="105" r="6" fill="#333"/>
                    <circle cx="125" cy="105" r="6" fill="#333"/>
                    <!-- Hidung -->
                    <ellipse cx="100" cy="135" rx="35" ry="25" fill="#ffafcc" stroke="#333" stroke-width="3"/>
                    <circle cx="88" cy="135" r="4" fill="#ff8fab"/>
                    <circle cx="112" cy="135" r="4" fill="#ff8fab"/>
                    <!-- Tanduk Kecil -->
                    <path d="M80 55 Q85 40 90 52" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M120 55 Q115 40 110 52" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <p class="text-xs text-[#ff8fab] font-bold mt-1">(Klik sapinya!)</p>
        </div>

        <h1 class="text-4xl md:text-5xl font-pacifico text-[#ff4d6d] mb-2 drop-shadow-md">Mooo-angat Sayang!</h1>
        <p class="text-[#ff758f] font-semibold italic">"Setiap bunga butuh waktu untuk mekar, begitu juga kamu."</p>

        <!-- Pesan Interaktif -->
        <div id="message-display" class="card-pink p-6 rounded-3xl shadow-xl min-h-[140px] flex items-center justify-center transform transition-all duration-500">
            <p class="text-[#c9184a] text-xl font-bold leading-relaxed">
                "AYOO SENYUMMMMM! Dunia lebih indah kalau kamu bahagia! ✨"
            </p>
        </div>

        <!-- Tombol Interaksi -->
        <div class="flex flex-col gap-4 mt-4">
            <button onclick="changeMessage()" class="bg-[#ffb3c1] hover:bg-[#ff8fab] text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-300 transform active:scale-95 border-b-4 border-[#ff758f]">
                Minta Semangat Baru! 🐮💖
            </button>
            
            <div id="gift-container" class="mt-4 p-4 bg-white/40 rounded-2xl border border-white">
                <p class="text-[#ff758f] mb-3 font-bold">Pilih kado bungamu hari ini:</p>
                <div class="flex justify-center gap-6">
                    <div onclick="openGift('flower')" class="gift-box text-5xl floating">🎁</div>
                    <div onclick="openGift('special')" class="gift-box text-5xl floating" style="animation-delay: 0.5s">💝</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal Hadiah -->
    <div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[40px] text-center max-w-sm border-8 border-[#ffb3c1] relative overflow-hidden">
            <div class="absolute -top-4 -left-4 text-4xl">🌸</div>
            <div class="absolute -bottom-4 -right-4 text-4xl">🌸</div>
            
            <div id="flower-icon" class="text-7xl mb-4 flower-pop">🌸</div>
            <h2 id="gift-title" class="text-2xl font-pacifico text-[#ff4d6d] mb-2">Untukmu!</h2>
            <p id="gift-text" class="text-[#590d22] mb-6 font-medium text-lg italic"></p>
            
            <button onclick="closeModal()" class="bg-[#ff758f] hover:bg-[#ff4d6d] text-white px-10 py-3 rounded-full font-bold shadow-lg transition-colors">
                Terima Kasih! ✨
            </button>
        </div>
    </div>

    <script>
        const messages = [
            "AYOO SENYUMMMMM! Jangan ditekuk terus mukanya, nanti sapinya sedih! 😊",
            "Terima kasih ya sudah sering mengalah, kamu hatinya baik banget! ❤️",
            "CIELAH LAPTOP BARUU! Makin semangat ya ngerjain tugas/kerjanya! 💻✨",
            "Kamu itu seperti susu strawberry, manis dan bikin mood naik! 🍓🥛",
            "Jangan lupa tarik napas dalam-dalam. Kamu sudah melakukan yang terbaik! 💪",
            "Anak sapi bilang: 'Mooo-ngkin capek, tapi kamu pasti bisa!' 🐮🌟",
            "Senyummu itu lebih cerah dari sinar matahari pagi lho! ☀️❤️",
            "Kalau dunia jahat, ingat ada aku dan sapi ini yang dukung kamu! ✨",
            "Satu langkah kecil tetaplah kemajuan. Semangat ya! 🔥",
            "Kamu berharga, kamu dicintai, dan kamu sangat hebat! 🌸"
        ];

        const flowers = [
            { icon: "🌻", name: "Bunga Matahari", msg: "Simbol keceriaan! Semoga harimu secerah bunga ini." },
            { icon: "🌹", name: "Mawar Merah", msg: "Kamu sangat berani dan cantik luar dalam!" },
            { icon: "🌷", name: "Tulip Pink", msg: "Melambangkan kasih sayang. Kamu disayangi!" },
            { icon: "🌸", name: "Cherry Blossom", msg: "Waktunya untuk mekar kembali dengan semangat baru!" },
            { icon: "🌼", name: "Daisy", msg: "Tetaplah sederhana dan bahagia seperti bunga ini." },
            { icon: "💐", name: "Buket Spesial", msg: "Karena satu bunga saja tidak cukup untuk menggambarkan kehebatanmu!" }
        ];

        const specials = [
            "Voucher Pelukan Online 24 Jam! 🤗",
            "Tiket Bebas Galau Selamanya! 🎟️",
            "Satu Kotak Cokelat Virtual Anti-Stress! 🍫",
            "Puk-puk Kepala Digital (Puk Puk!) 👋💖",
            "Kupon 'Kamu Selalu Benar' Hari Ini! 👑",
            "Bonus Senyuman dari Anak Sapi! 🐮✨"
        ];

        function changeMessage() {
            const display = document.getElementById('message-display');
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            
            display.style.opacity = 0;
            display.style.transform = "translateY(20px)";
            
            setTimeout(() => {
                display.innerHTML = `<p class="text-[#c9184a] text-xl font-bold italic">"${randomMsg}"</p>`;
                display.style.opacity = 1;
                display.style.transform = "translateY(0)";
                createRain(['✨', '💖', '🌸']);
            }, 300);
        }

        function openGift(type) {
            const modal = document.getElementById('modal');
            const giftText = document.getElementById('gift-text');
            const giftTitle = document.getElementById('gift-title');
            const flowerIcon = document.getElementById('flower-icon');
            
            if(type === 'flower') {
                const flower = flowers[Math.floor(Math.random() * flowers.length)];
                flowerIcon.innerText = flower.icon;
                giftTitle.innerText = flower.name;
                giftText.innerText = flower.msg;
                createRain([flower.icon]);
            } else {
                const special = specials[Math.floor(Math.random() * specials.length)];
                flowerIcon.innerText = "💝";
                giftTitle.innerText = "Kado Spesial!";
                giftText.innerText = special;
                createRain(['🎁', '✨', '💝']);
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function cowLove() {
            createRain(['❤️', '🐮', '🥰']);
            const msg = document.getElementById('message-display');
            msg.innerHTML = `<p class="text-[#ff4d6d] text-xl font-bold">"Moooooo~ Sapi ini bangga banget kamu punya laptop baru!"</p>`;
        }

        function createRain(items) {
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = items[Math.floor(Math.random() * items.length)];
                heart.className = 'heart-rain';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                heart.style.animationDuration = Math.random() * 2 + 2 + 's';
                heart.style.opacity = Math.random();
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
        }

        window.onload = () => {
            createRain(['🌸', '✨', '🐮', '💻']);
        };
    </script>
</body>
</html>
